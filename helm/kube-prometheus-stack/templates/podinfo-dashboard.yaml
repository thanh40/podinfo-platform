apiVersion: v1
kind: ConfigMap
metadata:
  name: podinfo-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    dashboard-provider: podinfo
  annotations:
    grafana_folder: podinfo
data:
  podinfo-red.json: |
    {
      "title": "podinfo RED Metrics",
      "uid": "podinfo-red",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "job",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(up, job)",
            "regex": ".*podinfo.*",
            "current": {},
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\"$job\"}[5m]))",
              "legendFormat": "req/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Rate (5xx %)",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\"$job\", status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=~\"$job\"}[5m])) * 100",
              "legendFormat": "error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          }
        },
        {
          "id": 3,
          "title": "Latency (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=~\"$job\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "id": 4,
          "title": "Pod Availability",
          "type": "stat",
          "gridPos": { "x": 0, "y": 8, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "up{job=~\"$job\"}",
              "legendFormat": "{{ "{{" }}instance{{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          }
        }
      ]
    }
