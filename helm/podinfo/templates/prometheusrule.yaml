{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "podinfo.fullname" . }}
  labels:
    {{- include "podinfo.labels" . | nindent 4 }}
    release: kube-prometheus-stack
spec:
  groups:
    - name: podinfo.availability
      rules:
        - alert: PodInfoDown
          expr: |
            kube_deployment_status_replicas_available{
              namespace="{{ .Release.Namespace }}",
              deployment="{{ include "podinfo.fullname" . }}"
            } == 0
          for: {{ .Values.prometheusRule.alertDuration }}
          labels:
            severity: critical
          annotations:
            summary: "podinfo is unreachable"
            description: "podinfo has had no healthy endpoints for more than 2 minutes."

        - alert: PodInfoHighErrorRate
          expr: |
            (
              rate(http_requests_total{job=~".*{{ include "podinfo.fullname" . }}.*", status_code=~"5.."}[5m])
              /
              rate(http_requests_total{job=~".*{{ include "podinfo.fullname" . }}.*"}[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "podinfo error rate above 5%"
            description: "podinfo is returning 5xx errors for more than 5% of requests."

        - alert: PodInfoHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(http_request_duration_seconds_bucket{job=~".*{{ include "podinfo.fullname" . }}.*"}[5m])
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "podinfo p99 latency above 1s"
            description: "podinfo p99 request latency has exceeded 1 second for the past 5 minutes."
{{- end }}
